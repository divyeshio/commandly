name: Validate Tool PR

on:
  pull_request:
    paths:
      - "public/tools-collection/**"

permissions:
  pull-requests: write
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Validate Tool JSON

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Validate and sanitize changed tool files
        id: validate
        run: |
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- "public/tools-collection/" | grep '\.json$' || true)

          if [ -z "$CHANGED" ]; then
            echo "No changed tool files."
            exit 0
          fi

          bun run ./scripts/validate-tool-collection.ts $CHANGED

      - name: Post PR comment on failure
        if: failure() && steps.validate.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `## Tool Validation Failed\n\nOne or more tool JSON files failed validation. Please check the workflow run logs for details.\n\nPlease fix the above issues and push again.`,
            });

      - name: Regenerate tools.json
        if: success()
        run: bun run ./scripts/generate-tools-json.ts

      - name: Commit updated files
        if: success()
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

          git add public/tools-collection/ public/tools.json

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: sanitize tool files and regenerate tools.json"
            git push origin HEAD:${{ github.head_ref }}
          fi
