name: Tool Submission Handler

on:
  issues:
    types: [opened]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  handle-tool-submission:
    if: |
      contains(github.event.issue.labels.*.name, 'tool-edit') ||
      contains(github.event.issue.labels.*.name, 'tool-submit')
    runs-on: ubuntu-latest
    name: Create PR from Tool Submission

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Parse issue body and create PR
        id: create-pr
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issueBody = context.payload.issue.body ?? "";
            const issueNumber = context.payload.issue.number;
            const issueLabels = context.payload.issue.labels.map(l => l.name);
            const isNewTool = issueLabels.includes("tool-submit");

            // Parse tool_name field from issue form body
            const toolNameMatch = issueBody.match(/###\s+Tool Name\s*\n+([^\n#]+)/);
            if (!toolNameMatch) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: "❌ Could not parse **Tool Name** from the issue body. Please make sure the form was filled correctly.",
              });
              core.setFailed("Could not parse tool_name");
              return;
            }
            const toolName = toolNameMatch[1].trim().toLowerCase().replace(/\s+/g, "-");

            // Parse tool_json field — content after the "Tool JSON" heading, inside the code block
            const jsonBlockMatch = issueBody.match(/###\s+Tool JSON\s*\n+```(?:json)?\s*\n([\s\S]*?)\n```/);
            if (!jsonBlockMatch) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: "❌ Could not parse **Tool JSON** from the issue body. Please make sure the JSON is wrapped in a code block.",
              });
              core.setFailed("Could not parse tool_json");
              return;
            }
            const toolJsonRaw = jsonBlockMatch[1].trim();

            // Validate JSON
            let toolJson;
            try {
              toolJson = JSON.parse(toolJsonRaw);
            } catch (e) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: `❌ The provided JSON is invalid:\n\`\`\`\n${e.message}\n\`\`\`\nPlease fix the JSON and open a new issue.`,
              });
              core.setFailed("Invalid JSON");
              return;
            }

            // Validate tool name matches JSON
            if (toolJson.name && toolJson.name !== toolName) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: `❌ The \`name\` field in the JSON (\`${toolJson.name}\`) does not match the Tool Name field (\`${toolName}\`). Please make sure they match.`,
              });
              core.setFailed("Tool name mismatch");
              return;
            }

            const branchType = isNewTool ? "tool-submit" : "tool-edit";
            const branchName = `tool-submission/${branchType}-${toolName}-${issueNumber}`;
            const filePath = `public/tools-collection/${toolName}.json`;
            const formattedJson = JSON.stringify(toolJson, null, 2);

            // Get the SHA of main branch
            const { data: ref } = await github.rest.git.getRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: "heads/main",
            });
            const mainSha = ref.object.sha;

            // Create new branch
            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/heads/${branchName}`,
              sha: mainSha,
            });

            // Check if file already exists (for edit vs create)
            let existingFileSha;
            try {
              const { data: existingFile } = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: filePath,
                ref: branchName,
              });
              existingFileSha = existingFile.sha;
            } catch {
              existingFileSha = undefined;
            }

            // Create or update the file
            const commitMessage = isNewTool
              ? `feat(tools): add ${toolName} (closes #${issueNumber})`
              : `fix(tools): update ${toolName} (closes #${issueNumber})`;

            await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: filePath,
              message: commitMessage,
              content: Buffer.from(formattedJson).toString("base64"),
              branch: branchName,
              ...(existingFileSha ? { sha: existingFileSha } : {}),
            });

            // Create the PR
            const prTitle = isNewTool
              ? `feat(tools): add ${toolName}`
              : `fix(tools): update ${toolName}`;

            const prBody = [
              `## Tool Submission`,
              ``,
              `Closes #${issueNumber}`,
              ``,
              `### Details`,
              ``,
              `| Field | Value |`,
              `|---|---|`,
              `| Tool Name | \`${toolName}\` |`,
              `| Type | ${isNewTool ? "New Tool" : "Tool Edit"} |`,
              `| File | \`${filePath}\` |`,
              ``,
              `### Checklist`,
              ``,
              `- [ ] JSON is valid and parses correctly`,
              `- [ ] Tool definition is complete and follows the schema`,
              `- [ ] Tested in the Commandly editor`,
            ].join("\n");

            const compareUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/compare/main...${branchName}?expand=1&title=${encodeURIComponent(prTitle)}&body=${encodeURIComponent(prBody)}`;

            let commentBody;
            try {
              const { data: pr } = await github.rest.pulls.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: prTitle,
                body: prBody,
                head: branchName,
                base: "main",
              });
              commentBody = `✅ Thank you for your contribution! A pull request has been automatically created: ${pr.html_url}\n\nA maintainer will review it shortly.`;
            } catch (prError) {
              commentBody = `✅ Thank you for your contribution! The branch \`${branchName}\` has been created with your changes.\n\n**[Click here to open a pull request](${compareUrl})**\n\n> Note: Automatic PR creation is disabled for this repository. A maintainer can also open the PR on your behalf.`;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: commentBody,
            });

            core.info(`Created PR #${pr.number}: ${pr.html_url}`);
