name: Submit New Tool
description: Contribute a new tool definition to the Commandly collection
title: "tool(new): "
labels:
  - tool-submit
body:
  - type: input
    id: tool_name
    attributes:
      label: Tool Name
      description: A unique identifier for the tool, lowercase with hyphens (e.g. `my-tool`).
      placeholder: my-tool
    validations:
      required: true

  - type: input
    id: tool_display_name
    attributes:
      label: Display Name
      description: Human-readable name shown in the UI.
      placeholder: My Tool
    validations:
      required: true

  - type: input
    id: tool_url
    attributes:
      label: Tool URL
      description: Link to the tool's homepage or repository (optional).
      placeholder: https://github.com/example/my-tool

  - type: textarea
    id: tool_json
    attributes:
      label: Tool JSON
      description: |
        Paste the full tool JSON here.

        **Tip:** Use the Commandly editor to build your tool definition, then click **Contribute** to copy the JSON and pre-fill this form.
      render: json
      placeholder: |
        {
          "name": "my-tool",
          "displayName": "My Tool",
          ...
        }
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have verified that the JSON is valid and correctly formatted.
          required: true
        - label: This tool does not already exist in the Commandly collection.
          required: true
        - label: I have tested the tool definition in the Commandly editor.
          required: false
