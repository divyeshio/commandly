name: Edit Existing Tool
description: Submit corrections or improvements to an existing tool definition
title: "tool(edit): "
labels:
  - tool-edit
body:
  - type: input
    id: tool_name
    attributes:
      label: Tool Name
      description: The tool's identifier (e.g. `httpx`, `subfinder`). Must match the filename in `public/tools-collection/`.
      placeholder: httpx
    validations:
      required: true

  - type: textarea
    id: tool_json
    attributes:
      label: Tool JSON
      description: |
        Paste the full updated tool JSON here.

        **Tip:** Open the tool on [commandly.divyesh.io](https://commandly.divyesh.io), make your edits in the tool editor, then click **Contribute** to copy the JSON and pre-fill this form.
      render: json
      placeholder: |
        {
          "name": "httpx",
          ...
        }
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have verified that the JSON is valid and correctly formatted.
          required: true
        - label: The `name` field in the JSON matches the Tool Name above.
          required: true
        - label: I have tested the changes in the Commandly editor before submitting.
          required: false
